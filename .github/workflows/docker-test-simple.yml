name: Docker Services Test (Simple)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-docker-services:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install kafka-python redis psycopg2-binary
    
    - name: Start PostgreSQL
      run: |
        docker run -d \
          --name postgres \
          -p 5432:5432 \
          -e POSTGRES_DB=tml \
          -e POSTGRES_USER=tml \
          -e POSTGRES_PASSWORD=tml123 \
          postgres:15-alpine
    
    - name: Start Redis
      run: |
        docker run -d \
          --name redis \
          -p 6379:6379 \
          redis:7.2-alpine
    
    - name: Start Redpanda (Kafka-compatible, no Zookeeper needed)
      run: |
        docker run -d \
          --name redpanda \
          -p 9092:9092 \
          -p 8081:8081 \
          -p 8082:8082 \
          -p 9644:9644 \
          redpandadata/redpanda:latest \
          redpanda start \
          --smp 1 \
          --reserve-memory 0M \
          --overprovisioned \
          --node-id 0 \
          --set redpanda.auto_create_topics_enabled=true \
          --kafka-addr PLAINTEXT://0.0.0.0:9092 \
          --advertise-kafka-addr PLAINTEXT://localhost:9092 \
          --pandaproxy-addr 0.0.0.0:8082 \
          --advertise-pandaproxy-addr localhost:8082 \
          --schema-registry-addr 0.0.0.0:8081 \
          --advertise-schema-registry-addr localhost:8081
    
    - name: Wait for services
      run: |
        echo "Waiting for services to start..."
        sleep 15
        
        # Check services
        echo "PostgreSQL:" && docker exec postgres pg_isready -U tml || echo "Not ready"
        echo "Redis:" && docker exec redis redis-cli ping || echo "Not ready"
        echo "Redpanda:" && docker exec redpanda rpk cluster info || echo "Not ready"
    
    - name: Create test topic
      run: |
        docker exec redpanda rpk topic create test-topic --partitions 3 --replicas 1 || echo "Topic creation failed"
        docker exec redpanda rpk topic list || echo "Topic list failed"
    
    - name: Test services with Python
      run: |
        # Use the existing test script
        python tests/test_docker_services.py || true
        
        # Also do a simple connectivity test
        echo "Direct connectivity tests:"
        python -c "import psycopg2; psycopg2.connect(host='localhost', port=5432, database='tml', user='tml', password='tml123').close(); print('PostgreSQL: OK')" || echo "PostgreSQL: Failed"
        python -c "import redis; redis.Redis(host='localhost', port=6379).ping(); print('Redis: OK')" || echo "Redis: Failed"
        python -c "from kafka import KafkaProducer; p = KafkaProducer(bootstrap_servers='localhost:9092', max_block_ms=5000); print('Kafka: OK')" || echo "Kafka: Failed"
    
    - name: Show logs if failed
      if: failure()
      run: |
        echo "=== Redpanda logs ==="
        docker logs redpanda --tail 50
        echo ""
        echo "=== Container status ==="
        docker ps -a
    
    - name: Cleanup
      if: always()
      run: |
        docker stop postgres redis redpanda 2>/dev/null || true
        docker rm postgres redis redpanda 2>/dev/null || true
