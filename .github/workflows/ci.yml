name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, "3.10", "3.11"]

    # NOTE: Using manual Docker commands instead of service containers
    # to avoid Docker Hub pull timeouts and have better control

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install core dependencies first to avoid build issues
        pip install numpy==1.24.3
        pip install pyyaml==6.0.1
        # Use simplified requirements for CI to avoid complex dependencies
        if [ -f requirements-ci.txt ]; then
          pip install -r requirements-ci.txt
        else
          pip install -r requirements.txt
        fi
        # Install dev dependencies if they exist
        if [ -f requirements-dev.txt ]; then
          pip install --no-deps -r requirements-dev.txt || pip install -r requirements-dev.txt
        fi

    - name: Lint with flake8
      run: |
        flake8 tml/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 tml/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Format check with black
      run: |
        black --check tml/ tests/

    - name: Import sort check with isort
      run: |
        isort --check-only tml/ tests/

    - name: Type check with mypy
      run: |
        mypy tml/ --ignore-missing-imports

    - name: Start services with retry logic
      run: |
        # Function to retry Docker pulls with exponential backoff
        retry_docker_pull() {
          local image=$1
          local max_attempts=3
          local delay=5
          
          for attempt in $(seq 1 $max_attempts); do
            echo "Attempting to pull $image (attempt $attempt/$max_attempts)"
            if docker pull $image; then
              echo "Successfully pulled $image"
              return 0
            else
              if [ $attempt -lt $max_attempts ]; then
                echo "Pull failed, waiting ${delay}s before retry..."
                sleep $delay
                delay=$((delay * 2))
              fi
            fi
          done
          
          echo "Failed to pull $image after $max_attempts attempts"
          return 1
        }
        
        # Start PostgreSQL
        echo "Starting PostgreSQL..."
        retry_docker_pull postgres:15-alpine
        docker run -d \
          --name postgres \
          -p 5432:5432 \
          -e POSTGRES_DB=tml \
          -e POSTGRES_USER=tml \
          -e POSTGRES_PASSWORD=tml123 \
          postgres:15-alpine
        
        # Start Redis
        echo "Starting Redis..."
        retry_docker_pull redis:7-alpine
        docker run -d \
          --name redis \
          -p 6379:6379 \
          redis:7-alpine redis-server
        
        # Wait for services to be ready
        echo "Waiting for PostgreSQL and Redis..."
        sleep 10
        
        # Verify services
        docker exec postgres pg_isready -U tml || echo "PostgreSQL not ready yet"
        docker exec redis redis-cli ping || echo "Redis not ready yet"

    - name: Start Redpanda (Kafka replacement)
      run: |
        # Function to retry Docker pulls (reuse from previous step)
        retry_docker_pull() {
          local image=$1
          local max_attempts=3
          local delay=5
          
          for attempt in $(seq 1 $max_attempts); do
            echo "Attempting to pull $image (attempt $attempt/$max_attempts)"
            if docker pull $image; then
              echo "Successfully pulled $image"
              return 0
            else
              if [ $attempt -lt $max_attempts ]; then
                echo "Pull failed, waiting ${delay}s before retry..."
                sleep $delay
                delay=$((delay * 2))
              fi
            fi
          done
          
          echo "Failed to pull $image after $max_attempts attempts"
          return 1
        }
        
        # Start Redpanda with retry
        echo "Starting Redpanda..."
        retry_docker_pull vectorized/redpanda:latest
        docker run -d \
          --name redpanda \
          -p 9092:9092 \
          -p 8081:8081 \
          vectorized/redpanda:latest \
          redpanda start \
          --smp 1 \
          --reserve-memory 0M \
          --overprovisioned \
          --node-id 0 \
          --kafka-addr PLAINTEXT://0.0.0.0:9092 \
          --advertise-kafka-addr PLAINTEXT://localhost:9092
        
        # Wait for Redpanda to be ready
        echo "Waiting for Redpanda to start..."
        for i in {1..30}; do
          if docker exec redpanda rpk cluster info &>/dev/null; then
            echo "✅ Redpanda is ready!"
            break
          fi
          echo "Waiting... ($i/30)"
          sleep 2
        done

    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=tml --cov-report=xml --cov-report=html
      env:
        REDIS_HOST: localhost
        KAFKA_BOOTSTRAP_SERVERS: localhost:9092

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        target: production
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  deploy-staging:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add your staging deployment commands here

  deploy-production:
    needs: [test, build, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # Add your production deployment commands here
