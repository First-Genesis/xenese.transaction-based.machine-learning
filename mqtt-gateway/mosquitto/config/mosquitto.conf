# TML MQTT Gateway - Mosquitto Configuration
# Production-ready configuration for Eclipse Mosquitto

# =============================================================================
# General Configuration
# =============================================================================

# Run as daemon
daemon false

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S

# Connection logging
connection_messages true

# =============================================================================
# Default Listener Configuration
# =============================================================================

# MQTT Protocol
listener 1883
protocol mqtt
allow_anonymous false

# WebSocket Support
listener 9001
protocol websockets
allow_anonymous false

# =============================================================================
# TLS/SSL Configuration
# =============================================================================

# MQTT over TLS
listener 8883
protocol mqtt
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false
use_identity_as_username false
allow_anonymous false

# TLS Version
tls_version tlsv1.2

# =============================================================================
# Authentication and Authorization
# =============================================================================

# Password file authentication
password_file /mosquitto/config/passwd

# Access Control List
acl_file /mosquitto/config/acl.conf

# =============================================================================
# Performance and Limits
# =============================================================================

# Maximum connections
max_connections 10000

# Message size limits
message_size_limit 1048576  # 1MB

# Queue limits
max_queued_messages 1000
max_inflight_messages 100

# Keep alive
max_keepalive 3600

# =============================================================================
# Persistence Configuration
# =============================================================================

# Persistence settings
autosave_interval 300
autosave_on_changes false

# =============================================================================
# Bridge Configuration (for clustering)
# =============================================================================

# Uncomment for multi-broker setup
# connection bridge-01
# address secondary-broker:1883
# topic tml/# both 0

# =============================================================================
# Monitoring and Health
# =============================================================================

# System topic publishing
sys_interval 60

# Health check topic
# Clients can subscribe to $SYS/broker/uptime for health monitoring
