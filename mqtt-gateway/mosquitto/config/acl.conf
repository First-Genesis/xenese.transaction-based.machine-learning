# TML MQTT Gateway - Access Control List
# Defines topic-based permissions for different user types

# =============================================================================
# Admin Users - Full Access
# =============================================================================
user tml_admin
topic readwrite #

user tml_gateway
topic readwrite #

# =============================================================================
# Device Users - Restricted Access
# =============================================================================

# Temperature Sensors
user temp_sensor_001
topic write tml/devices/sensor/temp_sensor_001/telemetry
topic write tml/devices/sensor/temp_sensor_001/status
topic read tml/devices/sensor/temp_sensor_001/config
topic read tml/devices/sensor/temp_sensor_001/commands

user temp_sensor_002
topic write tml/devices/sensor/temp_sensor_002/telemetry
topic write tml/devices/sensor/temp_sensor_002/status
topic read tml/devices/sensor/temp_sensor_002/config
topic read tml/devices/sensor/temp_sensor_002/commands

# Camera Devices
user camera_001
topic write tml/devices/camera/camera_001/telemetry
topic write tml/devices/camera/camera_001/status
topic read tml/devices/camera/camera_001/config
topic read tml/devices/camera/camera_001/commands

# Actuator Devices
user valve_001
topic write tml/devices/actuator/valve_001/telemetry
topic write tml/devices/actuator/valve_001/status
topic read tml/devices/actuator/valve_001/config
topic read tml/devices/actuator/valve_001/commands

# =============================================================================
# Gateway Devices
# =============================================================================
user edge_gateway_001
topic readwrite tml/gateways/edge_gateway_001/#
topic write tml/devices/+/+/telemetry
topic read tml/devices/+/+/commands

# =============================================================================
# System Services
# =============================================================================
user monitoring_service
topic read tml/+/+/+/status
topic read tml/system/+
topic read $SYS/#

user analytics_service
topic read tml/devices/+/+/telemetry
topic read tml/system/alerts/+

# =============================================================================
# Pattern-based Access Control
# =============================================================================

# Allow devices to access their own topics
pattern read tml/devices/%c/+/config
pattern write tml/devices/%c/+/telemetry
pattern write tml/devices/%c/+/status
pattern read tml/devices/%c/+/commands

# System topics (read-only for most users)
topic read $SYS/broker/uptime
topic read $SYS/broker/clients/connected
