version: '3.8'

services:
  # MinIO - S3-compatible object storage for model artifacts
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"     # API port
      - "9001:9001"     # Console port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_DEFAULT_BUCKETS: tml-models:public
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - tml-network

  # PostgreSQL with TimescaleDB for time-series data
  postgres:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tml_production
      POSTGRES_USER: tml_user
      POSTGRES_PASSWORD: tml_prod_2024!
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-prod-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tml_user -d tml_production"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tml-network

  # Redis Cluster for caching and Proto.Actor coordination
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server 
      --requirepass redis_prod_2024!
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfilename "tml-appendonly.aof"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tml-network

  # Kafka for transaction streaming
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    restart: unless-stopped
    networks:
      - tml-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - tml-network

  # Schema Registry for Kafka
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    restart: unless-stopped
    networks:
      - tml-network

  # TML API Service (.NET)
  tml-api:
    build:
      context: ./src
      dockerfile: Dockerfile.api
    ports:
      - "5000:5000"
      - "5001:5001"  # HTTPS
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5000;https://+:5001"
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=tml_production;Username=tml_user;Password=tml_prod_2024!"
      Redis__ConnectionString: "redis:6379,password=redis_prod_2024!"
      S3__UseMinIO: "true"
      S3__ServiceUrl: "http://minio:9000"
      S3__AccessKey: "minioadmin"
      S3__SecretKey: "minioadmin123"
      S3__BucketName: "tml-models"
      S3__ForcePathStyle: "true"
      Kafka__BootstrapServers: "kafka:29092"
      ActorSystem__ClusterName: "tml-production"
      ActorSystem__TransactionProcessorCount: "10"
      ActorSystem__ModelActorCount: "20"
      ActorSystem__PhysicsValidatorCount: "5"
      Jwt__Key: "${JWT_SECRET_KEY:-ThisIsAVerySecureKeyForProduction2024!}"
      Jwt__Issuer: "TML-Platform"
      Jwt__Audience: "TML-Clients"
    depends_on:
      - postgres
      - redis
      - kafka
      - minio
    volumes:
      - ./src:/app
      - tml_logs:/app/logs
    restart: unless-stopped
    networks:
      - tml-network

  # Traefik API Gateway
  traefik:
    image: traefik:v3.0
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Dashboard
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@tml-platform.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.tml.local`)"
      - "traefik.http.routers.traefik.service=api@internal"
    restart: unless-stopped
    networks:
      - tml-network

  # Zitadel for Authentication/Authorization
  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    ports:
      - "8082:8080"
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: tml_user
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: tml_prod_2024!
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: tml_user
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: tml_prod_2024!
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_FIRSTINSTANCE_PATPATH: /machinekey/zitadel-admin-sa.json
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: zitadel-admin-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Admin
    depends_on:
      - postgres
    volumes:
      - ./docker/zitadel:/machinekey
    restart: unless-stopped
    networks:
      - tml-network

  # Consul for service discovery (Proto.Actor clustering)
  consul:
    image: consul:1.17
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    volumes:
      - consul_data:/consul/data
    restart: unless-stopped
    networks:
      - tml-network

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus-prod.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - tml-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: grafana_prod_2024!
      GF_INSTALL_PLUGINS: redis-datasource,kafka-datasource,postgres-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana-prod/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana-prod/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - tml-network

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.51
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # HTTP collector
      - "6831:6831/udp" # Compact thrift protocol
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    restart: unless-stopped
    networks:
      - tml-network

  # MLflow for model tracking
  mlflow:
    image: python:3.11-slim
    ports:
      - "5002:5000"
    environment:
      BACKEND_STORE_URI: postgresql://tml_user:tml_prod_2024!@postgres:5432/mlflow
      DEFAULT_ARTIFACT_ROOT: s3://tml-models/mlflow
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
    volumes:
      - ./docker/mlflow-entrypoint-prod.sh:/entrypoint.sh
    depends_on:
      - postgres
      - minio
    command: ["/entrypoint.sh"]
    restart: unless-stopped
    networks:
      - tml-network

volumes:
  minio_data:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  consul_data:
  prometheus_data:
  grafana_data:
  traefik_certs:
  tml_logs:

networks:
  tml-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
