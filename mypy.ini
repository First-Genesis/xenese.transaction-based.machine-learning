[mypy]
# Global mypy configuration for TML project
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True
no_implicit_optional = False  # Allow implicit Optional for backward compatibility
strict_optional = False  # Less strict about None checks
allow_redefinition = True  # Allow variable redefinition
allow_untyped_globals = True
implicit_reexport = True

# Ignore specific error codes that are non-critical
disable_error_code = annotation-unchecked, attr-defined, no-redef

# Per-module configuration for problematic modules
[mypy-tml.physics.*]
ignore_errors = False
warn_return_any = False
check_untyped_defs = False

[mypy-tml.orchestration.*]
ignore_errors = False
allow_untyped_defs = True
no_implicit_optional = False

[mypy-tml.learning.*]
ignore_errors = False
allow_untyped_defs = True

[mypy-tml.core.config]
allow_redefinition = True
ignore_errors = False

[mypy-tml.core.inheritance]
ignore_errors = False
warn_return_any = False

[mypy-tml.utils.*]
no_implicit_optional = False
allow_untyped_defs = True

[mypy-tml.__init__]
ignore_errors = True  # __init__ files often have special patterns

[mypy-tml.core.production_processor]
warn_return_any = False
check_untyped_defs = False

[mypy-tml.core.enhanced_platform]
warn_return_any = False
check_untyped_defs = False

# External library stubs
[mypy-yaml.*]
ignore_missing_imports = True

[mypy-river.*]
ignore_missing_imports = True

[mypy-vowpalwabbit.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-kafka.*]
ignore_missing_imports = True

[mypy-cassandra.*]
ignore_missing_imports = True

[mypy-streamlit.*]
ignore_missing_imports = True

[mypy-pytest.*]
ignore_missing_imports = True

[mypy-aiohttp.*]
ignore_missing_imports = True

[mypy-kubernetes.*]
ignore_missing_imports = True

[mypy-docker.*]
ignore_missing_imports = True
